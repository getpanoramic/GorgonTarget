name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger a build from the actions tab

env:
  REGISTRY: ghcr.io
  # Downcases the repository name dynamically to prevent casing errors in Docker tags
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.11'

      - name: Install dependencies and test runner
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio fastapi httpx pydantic pydantic-settings

      - name: Run Pytest Suite
        run: |
          pytest tests/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
